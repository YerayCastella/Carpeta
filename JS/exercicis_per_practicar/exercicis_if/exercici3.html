<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Divisió</title>
</head>
<body>

<h1>Divisió</h1>

<input type="text" id="n1" placeholder="Número 1"><br><br>
<input type="text" id="n2" placeholder="Número 2"><br><br>

<button onclick="calcular()">Calcular</button>

<div id="res"></div>

<script>
function calcular() {
    let n1 = document.getElementById("n1").value;
    let n2 = document.getElementById("n2").value;

    if (n2 == 0) {
        res.textContent = "Error: no es pot dividir per zero";
    } else {
        res.textContent = "Resultat: " + (n1 / n2);
    }
}
</script>

</body>
</html>
