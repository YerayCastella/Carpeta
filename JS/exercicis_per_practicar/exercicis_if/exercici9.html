<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Entrada</title>
</head>
<body>

<h1>Preu de l'entrada</h1>

<input type="text" id="edat"><br><br>

<button onclick="calcular()">Calcular</button>

<div id="res"></div>

<script>
function calcular() {
    let edat = document.getElementById("edat").value;

    if (edat < 4) {
        res.textContent = "Gratis";
    } else if (edat <= 18) {
        res.textContent = "5€";
    } else {
        res.textContent = "10€";
    }
}
</script>

</body>
</html>
