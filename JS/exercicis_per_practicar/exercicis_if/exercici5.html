<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Tributació</title>
</head>
<body>

<h1>Has de tributar?</h1>

<input type="text" id="edat"><br><br>
<input type="text" id="ing"><br><br>

<button onclick="check()">Comprovar</button>

<div id="res"></div>

<script>
function check() {
    let edat = document.getElementById("edat").value;
    let ing = document.getElementById("ing").value;

    if (edat > 16 && ing >= 1000) {
        res.textContent = "Has de tributar";
    } else {
        res.textContent = "No has de tributar";
    }
}
</script>

</body>
</html>
