<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Projecte Final - Pilota Rebotant</title>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
    canvas { background-color: white; border: 3px solid #2c3e50; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
  </style>
</head>
<body>

<canvas id="jocCanvas" width="600" height="400"></canvas>

<script>
  let canvas = document.getElementById("jocCanvas");
  let ctx = canvas.getContext("2d");

  // Propietats de la pilota
  let x = canvas.width / 2;
  let y = canvas.height / 2;
  let dx = 4; // velocitat horitzontal
  let dy = -4; // velocitat vertical
  let radi = 20;

  function dibuixarPilota() {
    ctx.beginPath();
    ctx.arc(x, y, radi, 0, Math.PI * 2);
    ctx.fillStyle = "#e74c3c"; // Vermell
    ctx.fill();
    ctx.closePath();
  }

  function actualitzar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); // Esborrar fons
    
    dibuixarPilota();

    // Detectar col·lisió parets ESQUERRA i DRETA
    if(x + dx > canvas.width - radi || x + dx < radi) {
      dx = -dx; // Inverteix direcció
    }
    
    // Detectar col·lisió parets DALT i BAIX
    if(y + dy > canvas.height - radi || y + dy < radi) {
      dy = -dy; // Inverteix direcció
    }

    // Moure la pilota
    x += dx;
    y += dy;

    requestAnimationFrame(actualitzar); // Bucle
  }

  actualitzar(); // Començar l'animació
</script>

</body>
</html>
