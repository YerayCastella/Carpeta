<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Pas 1 - Canvas</title>
  <style>
    canvas { border: 2px solid #333; }
  </style>
</head>
<body>

    <canvas id="miCanvas" width="500" height="300" style="border: 1px solid black;"></canvas>

<script>
  let canvas = document.getElementById("miCanvas");
  let ctx = canvas.getContext("2d");

  let x = 250; // Centre del canvas (horitzontal)
  let y = 150; // Centre del canvas (vertical)
  let radi = 50;

  ctx.beginPath();
  ctx.arc(x, y, radi, 0, Math.PI * 2);
  

  ctx.fillStyle = "pink";
  ctx.fill(); // Omple el cercle
  
  ctx.lineWidth = 3;
  ctx.strokeStyle = "black";
  ctx.stroke(); // Dibuixa la vora
</script>
